<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备监控面板</title>
    <style>
        :root {
            --bg-primary: #0f0f1e;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(26, 26, 46, 0.8);
            --accent-primary: #00d4ff;
            --accent-secondary: #4facfe;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #00ff88;
            --danger: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-20px, -20px) rotate(5deg); }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
        }

        .card-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-value {
            display: flex;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .value {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .unit {
            font-size: 1.5rem;
            color: var(--accent-primary);
            margin-left: 10px;
            font-weight: 600;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .trend {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
        }

        .trend.down {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
        }

        .controls-section {
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .section-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .control-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .control-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
        }

        .control-info {
            display: flex;
            align-items: center;
        }

        .control-icon {
            font-size: 1.8rem;
            margin-right: 15px;
        }

        .control-name {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .control-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 32px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            border-radius: 32px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .slider::before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 2px;
            bottom: 2px;
            background: var(--text-primary);
            transition: all 0.4s ease;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        input:checked + .slider {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-color: var(--accent-primary);
        }

        input:checked + .slider::before {
            transform: translateX(28px);
        }

        .slider:hover {
            border-color: rgba(0, 212, 255, 0.5);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .value {
                font-size: 2.8rem;
            }

            .card {
                padding: 20px;
            }

            .control-card {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>设备监控面板</h1>
            <p>实时监控环境数据与设备状态</p>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">🌡️</div>
                    <div class="card-title">温度监控</div>
                </div>
                <div class="card-value">
                    <span class="value" id="temperature">25.5</span>
                    <span class="unit">°C</span>
                </div>
                <div class="card-footer">
                    <div class="status">
                        <div class="status-dot"></div>
                        <span>实时监测中</span>
                    </div>
                    <div class="trend" id="temp-trend">↑ 2.3%</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon">💡</div>
                    <div class="card-title">光照强度</div>
                </div>
                <div class="card-value">
                    <span class="value" id="light">750</span>
                    <span class="unit">lux</span>
                </div>
                <div class="card-footer">
                    <div class="status">
                        <div class="status-dot"></div>
                        <span>实时监测中</span>
                    </div>
                    <div class="trend" id="light-trend">↓ 1.5%</div>
                </div>
            </div>
        </div>

        <div class="controls-section">
            <h2 class="section-title">设备控制</h2>
            <div class="controls-grid" id="controls">
                <!-- 设备控制卡片将由 JavaScript 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 设备数据模型
        const deviceData = {
            temperature: {
                value: 25.5,
                unit: '°C',
                trend: 2.3,
                trendUp: true
            },
            light: {
                value: 750,
                unit: 'lux',
                trend: 1.5,
                trendUp: false
            },
            devices: [
                { id: 1, name: '主灯', icon: '💡', status: true },
                { id: 2, name: '空调', icon: '❄️', status: false },
                { id: 3, name: '风扇', icon: '🌀', status: true },
                { id: 4, name: '加湿器', icon: '💧', status: false }
            ]
        };

        // 更新温度显示
        function updateTemperature() {
            const tempElement = document.getElementById('temperature');
            const trendElement = document.getElementById('temp-trend');

            // 模拟温度变化
            const change = (Math.random() - 0.5) * 2;
            deviceData.temperature.value += change;
            deviceData.temperature.value = Math.max(20, Math.min(30, deviceData.temperature.value));

            // 平滑更新数值
            animateValue(tempElement, parseFloat(tempElement.textContent), deviceData.temperature.value, 500);

            // 更新趋势
            deviceData.temperature.trend = Math.abs(change * 2).toFixed(1);
            deviceData.temperature.trendUp = change > 0;

            trendElement.textContent = `${deviceData.temperature.trendUp ? '↑' : '↓'} ${deviceData.temperature.trend}%`;
            trendElement.className = `trend ${deviceData.temperature.trendUp ? '' : 'down'}`;
        }

        // 更新光照显示
        function updateLight() {
            const lightElement = document.getElementById('light');
            const trendElement = document.getElementById('light-trend');

            // 模拟光照变化
            const change = Math.floor((Math.random() - 0.5) * 100);
            deviceData.light.value += change;
            deviceData.light.value = Math.max(500, Math.min(1000, deviceData.light.value));

            // 平滑更新数值
            animateValue(lightElement, parseInt(lightElement.textContent), deviceData.light.value, 500);

            // 更新趋势
            deviceData.light.trend = Math.abs(change / 10).toFixed(1);
            deviceData.light.trendUp = change > 0;

            trendElement.textContent = `${deviceData.light.trendUp ? '↑' : '↓'} ${deviceData.light.trend}%`;
            trendElement.className = `trend ${deviceData.light.trendUp ? '' : 'down'}`;
        }

        // 数值动画
        function animateValue(element, start, end, duration) {
            const startTime = performance.now();
            const isFloat = !Number.isInteger(end);

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // 使用 easeOutCubic 缓动函数
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = start + (end - start) * easeProgress;

                element.textContent = isFloat ? current.toFixed(1) : Math.round(current);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // 渲染设备控制卡片
        function renderControls() {
            const controlsContainer = document.getElementById('controls');

            controlsContainer.innerHTML = deviceData.devices.map(device => `
                <div class="control-card">
                    <div class="control-info">
                        <div class="control-icon">${device.icon}</div>
                        <div>
                            <div class="control-name">${device.name}</div>
                            <div class="control-status">${device.status ? '已开启' : '已关闭'}</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" ${device.status ? 'checked' : ''} onchange="toggleDevice(${device.id})">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');
        }

        // 切换设备状态
        function toggleDevice(deviceId) {
            const device = deviceData.devices.find(d => d.id === deviceId);
            if (device) {
                device.status = !device.status;
                renderControls();

                // 添加切换动画反馈
                const card = event.target.closest('.control-card');
                card.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 150);
            }
        }

        // 初始化
        function init() {
            renderControls();

            // 每3秒更新一次数据
            setInterval(updateTemperature, 3000);
            setInterval(updateLight, 3000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
